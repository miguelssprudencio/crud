<!DOCTYPE html>
<html lang="pt-BR" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Focus — Lista de Tarefas</title>
  <meta name="description" content="Focus: um aplicativo de produtividade elegante para organizar suas tarefas com clareza." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="topbar">
    <div class="topbar__inner">
      <div class="topbar__brand">
        
        <svg class="topbar__logo" viewBox="0 0 28 28" fill="none" aria-hidden="true">
          <circle cx="14" cy="14" r="13" stroke="currentColor" stroke-width="1.6"/>
          <circle cx="14" cy="14" r="5" fill="currentColor"/>
          <line x1="14" y1="1" x2="14" y2="6"  stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="14" y1="22" x2="14" y2="27" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="1"  y1="14" x2="6"  y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
          <line x1="22" y1="14" x2="27" y2="14" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/>
        </svg>
        <span class="topbar__name">Focus</span>
      </div>

      <div class="topbar__actions">
       
        <button class="icon-btn" id="themeToggle" type="button" aria-label="Alternar tema claro/escuro">
        
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1"  x2="12" y2="3"/>
            <line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22"   x2="5.64"  y2="5.64"/>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1"  y1="12" x2="3"  y2="12"/>
            <line x1="21" y1="12" x2="23" y2="12"/>
            <line x1="4.22" y1="19.78" x2="5.64"  y2="18.36"/>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="app-layout">

    <aside class="sidebar" id="sidebar">

      <section class="stats-panel" aria-labelledby="statsTitle">
        <h2 class="panel-label" id="statsTitle">Visão Geral</h2>
        <div class="stats-grid">
          <div class="stat-card">
            <span class="stat-value" id="statTotal">0</span>
            <span class="stat-label">Total</span>
          </div>
          <div class="stat-card stat-card--done">
            <span class="stat-value" id="statDone">0</span>
            <span class="stat-label">Concluídas</span>
          </div>
          <div class="stat-card stat-card--pending">
            <span class="stat-value" id="statPending">0</span>
            <span class="stat-label">Pendentes</span>
          </div>
          <div class="stat-card stat-card--cat">
            <span class="stat-value stat-value--sm" id="statTopCat">—</span>
            <span class="stat-label">Categoria top</span>
          </div>
        </div>

        <div class="progress-section">
          <div class="progress-header">
            <span>Progresso</span>
            <span id="progressPct">0%</span>
          </div>
          <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Progresso das tarefas">
            <div class="progress-fill" id="progressFill"></div>
          </div>
        </div>
      </section>

      <section class="filter-panel" aria-labelledby="filterTitle">
        <h2 class="panel-label" id="filterTitle">Filtrar</h2>
        <nav class="filter-nav" aria-label="Filtros de status">
          <button class="filter-btn active" data-filter="all" type="button">Todas</button>
          <button class="filter-btn" data-filter="pending" type="button">Pendentes</button>
          <button class="filter-btn" data-filter="done" type="button">Concluídas</button>
        </nav>

        <h3 class="panel-sublabel">Categoria</h3>
        <nav class="filter-nav" aria-label="Filtros de categoria">
          <button class="filter-btn active" data-cat="all" type="button">Todas</button>
          <button class="filter-btn" data-cat="work" type="button">
            <span class="cat-dot cat-dot--work"></span>Trabalho
          </button>
          <button class="filter-btn" data-cat="study" type="button">
            <span class="cat-dot cat-dot--study"></span>Estudos
          </button>
          <button class="filter-btn" data-cat="personal" type="button">
            <span class="cat-dot cat-dot--personal"></span>Pessoal
          </button>
          <button class="filter-btn" data-cat="health" type="button">
            <span class="cat-dot cat-dot--health"></span>Saúde
          </button>
          <button class="filter-btn" data-cat="other" type="button">
            <span class="cat-dot cat-dot--other"></span>Outros
          </button>
        </nav>

        <h3 class="panel-sublabel">Prioridade</h3>
        <nav class="filter-nav" aria-label="Filtros de prioridade">
          <button class="filter-btn active" data-priority="all" type="button">Todas</button>
          <button class="filter-btn" data-priority="high" type="button">
            <span class="priority-dot priority-dot--high"></span>Alta
          </button>
          <button class="filter-btn" data-priority="medium" type="button">
            <span class="priority-dot priority-dot--medium"></span>Média
          </button>
          <button class="filter-btn" data-priority="low" type="button">
            <span class="priority-dot priority-dot--low"></span>Baixa
          </button>
        </nav>
      </section>

      <section class="sort-panel" aria-labelledby="sortTitle">
        <h2 class="panel-label" id="sortTitle">Ordenar</h2>
        <div class="sort-select-wrap">
          <label for="sortSelect" class="sr-only">Critério de ordenação</label>
          <select id="sortSelect" class="sort-select">
            <option value="newest">Mais recentes</option>
            <option value="oldest">Mais antigas</option>
            <option value="priority">Maior prioridade</option>
            <option value="alpha">Ordem alfabética</option>
          </select>
        </div>
      </section>

    </aside>

    <section class="main-content">

      <div class="content-header">
        <div class="search-wrap">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input
            type="search"
            id="searchInput"
            class="search-input"
            placeholder="Pesquisar tarefas..."
            autocomplete="off"
            aria-label="Pesquisar tarefas"
          />
          <button class="search-clear" id="searchClear" type="button" aria-label="Limpar pesquisa" hidden>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>

        <button class="sidebar-toggle icon-btn" id="sidebarToggle" type="button" aria-label="Abrir filtros" aria-expanded="false" aria-controls="sidebar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
            <line x1="3" y1="6"  x2="21" y2="6"/>
            <line x1="3" y1="12" x2="16" y2="12"/>
            <line x1="3" y1="18" x2="11" y2="18"/>
          </svg>
        </button>
      </div>

      <div class="add-task-card glass-card">
        <h2 class="add-task-title">Nova tarefa</h2>

        <div class="add-task-row">
          <input
            type="text"
            id="taskInput"
            class="task-text-input"
            placeholder="O que precisa ser feito?"
            maxlength="200"
            autocomplete="off"
            aria-label="Título da nova tarefa"
          />
        </div>

        <div class="add-task-meta">
          <div class="select-wrap">
            <label for="taskCategory" class="meta-label">Categoria</label>
            <select id="taskCategory" class="meta-select">
              <option value="work">Trabalho</option>
              <option value="study">Estudos</option>
              <option value="personal">Pessoal</option>
              <option value="health">Saúde</option>
              <option value="other">Outros</option>
            </select>
          </div>

          <div class="select-wrap">
            <label for="taskPriority" class="meta-label">Prioridade</label>
            <select id="taskPriority" class="meta-select">
              <option value="medium">Média</option>
              <option value="high">Alta</option>
              <option value="low">Baixa</option>
            </select>
          </div>

          <div class="select-wrap">
            <label for="taskDue" class="meta-label">Prazo</label>
            <input type="date" id="taskDue" class="meta-select" />
          </div>

          <button class="btn-add" id="addTaskBtn" type="button" aria-label="Adicionar tarefa">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" aria-hidden="true">
              <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
            </svg>
            <span>Adicionar</span>
          </button>
        </div>
      </div>

      <div class="result-info" id="resultInfo" aria-live="polite"></div>

      <div class="task-list" id="taskList" role="list" aria-label="Lista de tarefas"></div>

      <div class="empty-state" id="emptyState" hidden>
        <svg class="empty-illustration" viewBox="0 0 220 180" fill="none" aria-hidden="true">
          <rect x="30" y="30" width="160" height="120" rx="12" stroke="currentColor" stroke-width="1.5" stroke-dasharray="5 4"/>
          <circle cx="110" cy="82" r="24" stroke="currentColor" stroke-width="1.5"/>
          <path d="M100 82 l8 8 l14-16" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          <line x1="68" y1="128" x2="152" y2="128" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="84" y1="140" x2="136" y2="140" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
        <p class="empty-title" id="emptyTitle">Tudo limpo por aqui.</p>
        <p class="empty-sub" id="emptySub">Adicione sua primeira tarefa acima para começar.</p>
      </div>

    </section>
  </main>

  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <div class="modal-backdrop" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="deleteModalTitle" hidden>
    <div class="modal-box">
      <div class="modal-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/>
          <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
          <path d="M10 11v6"/><path d="M14 11v6"/>
          <path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
        </svg>
      </div>
      <h3 class="modal-title" id="deleteModalTitle">Excluir tarefa?</h3>
      <p class="modal-body">Esta ação não pode ser desfeita.</p>
      <div class="modal-actions">
        <button class="btn-modal btn-modal--cancel" id="cancelDelete" type="button">Cancelar</button>
        <button class="btn-modal btn-modal--confirm" id="confirmDelete" type="button">Excluir</button>
      </div>
    </div>
  </div>

  <div class="toast-container" id="toastContainer" aria-live="assertive" aria-atomic="false"></div>

  <script src="script.js"></script>
</body>
</html>
